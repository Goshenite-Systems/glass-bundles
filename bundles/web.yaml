# Goshenite bundle: web application assessment
#
# Reality checks applied (verified against Fedora 44 / Aurora repos, 2026-07):
#  * IN Fedora repos  -> rpm:   gobuster, wafw00f, whatweb
#  * NOT in Fedora    -> sqlmap, nikto, wfuzz, hashid  => container (web-lab) / flatpak
#  * Proprietary GUI  -> flatpak: Burp Suite Community
# Fast-moving / unpackaged offensive web tooling lives in the web-lab distrobox.
name: web
description: Web application assessment tooling
category: web

rpm:
  - gobuster
  - wafw00f
  - whatweb

flatpak:
  - io.github.portswigger.BurpSuiteCommunity

# sqlmap, nikto, wfuzz, dirsearch, etc. (no Fedora RPM) ship here instead of the host.
containers:
  - ghcr.io/goshenite-systems/web-lab:latest

desktop:
  - name: gobuster
    exec: gobuster
    terminal: true
  - whatweb

config:
  aliases:
    fuzz-dir: "gobuster dir -w /usr/share/wordlists/dirb/common.txt -u"
    # sqlmap/nikto are provided via: distrobox enter web-lab
    sqlmap: "distrobox enter web-lab -- sqlmap"
    nikto: "distrobox enter web-lab -- nikto"
