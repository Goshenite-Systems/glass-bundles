# Goshenite bundle: password & hash auditing
name: passwords
description: Password cracking and hash auditing
category: passwords

rpm:
  - john
  - hashcat
  - hydra
  - hashid

desktop:
  - name: john
    exec: john
    terminal: true
  - hashcat

config:
  aliases:
    hc-md5: "hashcat -m 0 -a 0"
    jtr: "john --wordlist=/usr/share/wordlists/rockyou.txt"
