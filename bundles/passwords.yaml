# Goshenite bundle: password & hash auditing
# Verified against Fedora 44 / Aurora repos (2026-07):
#   IN Fedora  -> john, hashcat, hydra
#   NOT in Fedora -> hashid (ship via container / pipx instead)
name: passwords
description: Password cracking and hash auditing
category: passwords

rpm:
  - john
  - hashcat
  - hydra

desktop:
  - name: john
    exec: john
    terminal: true
  - hashcat

config:
  aliases:
    hc-md5: "hashcat -m 0 -a 0"
    jtr: "john --wordlist=/usr/share/wordlists/rockyou.txt"
